<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MediLens AI helps users understand prescriptions, medicines, and medical reports with clear, structured AI-assisted analysis."
    />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/medilens-logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      html, body, #root { min-height: 100%; margin: 0; background: #000; }
      body { color: #fff; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .intro-screen { position: fixed; inset: 0; z-index: 100; display: grid; min-height: 100dvh; place-items: center; overflow: hidden; padding: 1.5rem; box-sizing: border-box; background: radial-gradient(ellipse at 50% 34%, rgba(255,255,255,.12), transparent 24rem), linear-gradient(180deg,#090a0c 0%,#020203 54%,#000 100%); }
      .intro-content { position: relative; z-index: 1; display: flex; width: min(100%,46rem); flex-direction: column; align-items: center; text-align: center; }
      .intro-logo-shell { position: relative; display: grid; width: 6rem; height: 6rem; place-items: center; }
      .intro-logo-glow { position: absolute; inset: -.85rem; border-radius: 999px; background: radial-gradient(circle,rgba(255,255,255,.09),transparent 68%); }
      .intro-logo-mark { position: relative; display: grid; width: 4.75rem; height: 4.75rem; place-items: center; overflow: hidden; border-radius: 1.65rem; box-shadow: inset 0 1px 0 rgba(255,255,255,.3),0 18px 46px rgba(0,0,0,.48),0 0 18px rgba(255,255,255,.035); }
      .intro-logo-icon { display: block; width: 100%; height: 100%; object-fit: contain; }
      .intro-copy { margin-top: 1.65rem; }
      .intro-copy h1 { margin: 0; font-family: Georgia,"Times New Roman",serif; font-size: clamp(3.05rem,8vw,6rem); font-weight: 400; line-height: .9; letter-spacing: -.055em; white-space: nowrap; color: #f4f4f2; }
      .intro-copy p { max-width: 29rem; margin: 1.15rem auto 0; color: rgba(255,255,255,.58); font-size: clamp(.94rem,2vw,1.08rem); font-weight: 300; line-height: 1.7; letter-spacing: -.025em; }
      .intro-progress { width: min(11rem,52vw); height: 1px; margin-top: 2rem; overflow: hidden; background: rgba(255,255,255,.1); }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://stream.mux.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Inter:wght@300;400;500;600&amp;display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Inter:wght@300;400;500;600&amp;display=swap" /></noscript>
    <title>MediLens AI</title>
  </head>
  <body>
    <div id="root"><div class="intro-screen" role="status" aria-live="polite" aria-label="MediLens AI is preparing your workspace"><div class="intro-ambient" aria-hidden="true"></div><div class="intro-content"><div class="intro-logo-shell" aria-hidden="true"><span class="intro-logo-glow"></span><span class="intro-logo-mark"><img class="intro-logo-icon" src="/medilens-logo.svg" alt="" aria-hidden="true" draggable="false" /></span></div><div class="intro-copy"><h1>MediLens AI</h1><p>Understand prescriptions, medicines, and reports with calm AI-assisted clarity.</p></div><div class="intro-progress" aria-hidden="true"><span></span></div></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
